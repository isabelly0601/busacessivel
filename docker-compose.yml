version: '3.8'

services:
  database:
    image: bitnami/postgresql:latest
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "app_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres
      - POSTGRESQL_DATABASE=app_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/bitnami/postgresql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@database:5432/app_db?schema=public
    depends_on:
      database:
        condition: service_healthy
    command: sh -c "npx prisma db push --accept-data-loss && npx prisma db seed && npm run dev"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
